<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Editor</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <main>
      <section class="card">
        <div class="top-row">
          <div>
            <h1 id="pageTitle" class="title">Create tournament year</h1>
            <p id="pageSubtitle" class="muted">Create a new tournament year.</p>
          </div>
          <a href="/admin/" class="back-link">← Back to admin console</a>
        </div>

        <p id="message" class="status" aria-live="polite"></p>

        <article class="panel">
          <h2 id="formHeader">Create tournament year</h2>
          <form id="tournamentForm" class="form-stack" autocomplete="off">
            <label>
              Season name
              <input name="name" required placeholder="2026 Summer Classic" />
            </label>
            <div class="inline-grid">
              <label>
                Start date
                <input name="startDate" type="date" />
              </label>
              <label>
                End date
                <input name="endDate" type="date" />
              </label>
              <label>
                Status
                <select name="status">
                  <option value="draft">draft</option>
                  <option value="published">published</option>
                </select>
              </label>
            </div>
            <label>
              Primary location (create only for now)
              <input id="locationInput" name="locations" placeholder="Port Coquitlam" />
            </label>
            <div id="lockActions" class="lock-actions" hidden>
              <button id="lockBtn" type="button" class="danger-btn">Lock tournament</button>
              <p class="muted">Locking is irreversible. A locked tournament becomes read-only.</p>
            </div>
            <div class="actions-row">
              <button id="submitBtn" type="submit">Create tournament</button>
              <button id="cancelBtn" type="button">Cancel</button>
            </div>
          </form>
        </article>
      </section>
    </main>

    <script type="module" src="/admin/tournament-editor.js"></script>
  </body>
</html>
