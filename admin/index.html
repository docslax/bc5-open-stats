<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BC5 Admin Console</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <main>
      <section class="card">
        <div class="top-row">
          <div>
            <h1 class="title">BC5 Admin Console</h1>
            <p class="muted">
              Select a tournament to edit, or create a new one.
            </p>
          </div>
          <a href="/" class="back-link">← Back to home</a>
        </div>
        <p id="message" class="status" aria-live="polite"></p>

        <article class="panel">
          <h2>Existing Tournaments</h2>
          <div id="tournamentList" class="list-scroll">Loading...</div>
          <div class="actions-row">
            <button id="createTournamentBtn" type="button">
              Create Tournament
            </button>
          </div>
        </article>
      </section>
    </main>
    <script type="module" src="/admin/dashboard.js"></script>
  </body>
</html>
